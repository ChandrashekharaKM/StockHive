<div class="login-container">
  <h2>StockHive Login</h2>
  <form (submit)="onLogin($event)">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" required />
    </div>
    <div class="error" *ngIf="error()">{{ error() }}</div>
    <button type="submit">Sign In</button>
  </form>
</div>
